<svg viewBox="0 0 180 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Back view muscle heatmap">
  <!-- decorative, non-interactive -->
  <circle class="body-decor" cx="90" cy="22" r="15" />
  <rect class="body-decor" x="82" y="35" width="16" height="8" />
  <rect class="body-decor" x="26" y="114" width="18" height="52" rx="6" />
  <rect class="body-decor" x="136" y="114" width="18" height="52" rx="6" />
  <rect class="body-decor" x="58" y="290" width="28" height="8" rx="3" />
  <rect class="body-decor" x="94" y="290" width="28" height="8" rx="3" />

  <!-- shoulders (rear delts — same simple group as front) -->
  <ellipse class="muscle-region heat-cold" data-muscle="shoulders" cx="52" cy="58" rx="16" ry="12"><title>Shoulders</title></ellipse>
  <ellipse class="muscle-region heat-cold" data-muscle="shoulders" cx="128" cy="58" rx="16" ry="12"><title>Shoulders</title></ellipse>

  <!-- back -->
  <rect class="muscle-region heat-cold" data-muscle="back" x="58" y="50" width="64" height="90" rx="10"><title>Back</title></rect>

  <!-- triceps -->
  <rect class="muscle-region heat-cold" data-muscle="triceps" x="28" y="54" width="20" height="58" rx="6"><title>Triceps</title></rect>
  <rect class="muscle-region heat-cold" data-muscle="triceps" x="132" y="54" width="20" height="58" rx="6"><title>Triceps</title></rect>

  <!-- glutes -->
  <rect class="muscle-region heat-cold" data-muscle="glutes" x="62" y="140" width="56" height="34" rx="12"><title>Glutes</title></rect>

  <!-- hamstrings -->
  <rect class="muscle-region heat-cold" data-muscle="hamstrings" x="58" y="174" width="28" height="66" rx="8"><title>Hamstrings</title></rect>
  <rect class="muscle-region heat-cold" data-muscle="hamstrings" x="94" y="174" width="28" height="66" rx="8"><title>Hamstrings</title></rect>

  <!-- calves (back) -->
  <rect class="muscle-region heat-cold" data-muscle="calves" x="60" y="240" width="24" height="50" rx="6"><title>Calves</title></rect>
  <rect class="muscle-region heat-cold" data-muscle="calves" x="96" y="240" width="24" height="50" rx="6"><title>Calves</title></rect>
</svg>
