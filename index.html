<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas — Gym Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111110">
    <link rel="icon" href="assets/icon-192.png" type="image/png">
    <!-- iOS Safari's "Add to Home Screen" reads this tag specifically —
         it doesn't use the manifest's icons array the way Android does. -->
    <link rel="apple-touch-icon" href="assets/icon-180.png">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <main class="screens">
            <!-- 3 screens, one per bottom-nav tab, plus the merged Log
                 session content living inside #screen-exercises (see its
                 comment below) — only the screen with .active shows at a
                 time, switchTab() in app.js toggles it by matching
                 data-target (nav button) to data-screen (section). -->

            <section id="screen-heatmap" class="screen active" data-screen="heatmap">
                <div class="topbar">
                    <h1>Heatmap</h1>
                </div>

                <!-- Values start as "—" placeholders; heatmap.js fills them
                     in once there's real workout data to compute from. -->
                <div class="callouts">
                    <div class="callout-card">
                        <p class="callout-label">Needs work</p>
                        <p class="callout-value">—</p>
                        <p class="callout-meta">—</p>
                    </div>
                    <div class="callout-card">
                        <p class="callout-label">Most trained</p>
                        <p class="callout-value">—</p>
                        <p class="callout-meta">—</p>
                    </div>
                </div>

                <!-- Left empty here — heatmap.js hands these to the
                     body-highlighter library (CDN import), which renders
                     its own anatomical SVG into each container. -->
                <div class="heatmap-area">
                    <div class="body-view" data-view="front"></div>
                    <div class="body-view" data-view="back"></div>
                </div>

                <button class="cta-primary" id="log-workout-cta">+ Log workout</button>
            </section>

            <!-- Exercises + the in-progress session, merged into one screen —
                 there's no separate "Log" tab. Browsing is always available;
                 the session section above it (log.js's renderSession()) is
                 hidden via .hidden until at least one exercise is added.
                 Entered by starting a session (Heatmap's CTA, or "Add to
                 session" from the detail sheet below), never directly from
                 the bottom nav — see docs/decisions.md "Merge Log into
                 Exercises." -->
            <section id="screen-exercises" class="screen" data-screen="exercises">
                <div class="topbar">
                    <h1>Exercises</h1>
                    <button class="text-action" id="finish-session-btn" hidden>Finish</button>
                </div>

                <!-- Populated by log.js's renderSession() — one exercise-card
                     per added exercise. Hidden (via .hidden) whenever the
                     session is empty, rather than showing an empty-state
                     message — the library below is this screen's default
                     content either way. -->
                <div class="session-section hidden" id="session-section">
                    <h2 class="section-heading">Current session</h2>
                    <ul class="session-list"></ul>
                </div>

                <div class="section-block">
                    <input class="search-input" type="search" placeholder="Search exercises…" />
                    <!-- data-muscle values match exercise.muscleGroup exactly
                         (see js/muscle-taxonomy.js) so exercises.js's filter
                         is a direct equality check — "all" is the one special case. -->
                    <div class="filter-pills">
                        <button class="filter-pill active" data-muscle="all">All</button>
                        <button class="filter-pill" data-muscle="Chest">Chest</button>
                        <button class="filter-pill" data-muscle="Back">Back</button>
                        <button class="filter-pill" data-muscle="Shoulders">Shoulders</button>
                        <button class="filter-pill" data-muscle="Arms">Arms</button>
                        <button class="filter-pill" data-muscle="Core">Core</button>
                        <button class="filter-pill" data-muscle="Legs">Legs</button>
                    </div>
                </div>

                <!-- Populated by exercises.js's renderExercises(). -->
                <ul class="exercise-list"></ul>
            </section>

            <section id="screen-history" class="screen" data-screen="history">
                <div class="topbar">
                    <h1>History</h1>
                    <div class="topbar-actions">
                        <div class="toggle-pill" data-toggle="history-view">
                            <button class="toggle-option active" data-value="list">List</button>
                            <button class="toggle-option" data-value="calendar">Calendar</button>
                        </div>
                    </div>
                </div>

                <!-- Both views exist in the DOM at once; history.js toggles
                     which has .active rather than swapping content in/out. -->
                <div class="history-view active" data-view="list">
                    <p class="empty-state">No workouts logged yet.</p>
                </div>

                <div class="history-view" data-view="calendar">
                    <div class="calendar-header">
                        <button class="icon-button" id="cal-prev">‹</button>
                        <p class="calendar-month-label"></p>
                        <button class="icon-button" id="cal-next">›</button>
                    </div>
                    <!-- Rebuilt every month navigation by history.js's renderCalendar(). -->
                    <div class="calendar-grid"></div>
                </div>
            </section>

        </main>

        <!-- Fixed to the viewport bottom as a group so the session bar
             (log.js's updateSessionBar()) stacks directly above the nav
             with no manual height math — app.js measures this wrapper's
             real height via ResizeObserver and writes it into
             --bottom-chrome-height, which .screens reads for its
             padding-bottom. Icons are Tabler's outline set (MIT), inlined
             as raw SVG rather than pulled from a CDN — there are only a
             few of them, so embedding costs nothing and keeps the nav
             working offline. stroke="currentColor" means each icon
             automatically follows its button's own text colour with no
             extra CSS. -->
        <div class="bottom-chrome">
            <!-- Visible whenever a session is in progress and you're not
                 already looking at it — the only way back to it besides
                 starting a new addition, since Log isn't in the bottom nav.
                 Hidden/shown and its text kept in sync by log.js's
                 updateSessionBar(). -->
            <button class="session-bar hidden" id="session-bar">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2" /><path d="M9 5a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2" /><path d="M9 12l.01 0" /><path d="M13 12l2 0" /><path d="M9 16l.01 0" /><path d="M13 16l2 0" /></svg>
                <span class="session-bar-text"></span>
                <span class="session-bar-arrow" aria-hidden="true">›</span>
            </button>
            <nav class="bottom-nav">
                <button class="nav-item active" data-target="heatmap">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10.941c2.333 -3.308 .167 -7.823 -1 -8.941c0 3.395 -2.235 5.299 -3.667 6.706c-1.43 1.408 -2.333 3.294 -2.333 5.588c0 3.704 3.134 6.706 7 6.706c3.866 0 7 -3.002 7 -6.706c0 -1.712 -1.232 -4.403 -2.333 -5.588c-2.084 3.353 -3.257 3.353 -4.667 2.235" /></svg>
                    <span class="nav-label">Heatmap</span>
                </button>
                <button class="nav-item" data-target="exercises">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h1" /><path d="M6 8h-2a1 1 0 0 0 -1 1v6a1 1 0 0 0 1 1h2" /><path d="M6 7v10a1 1 0 0 0 1 1h1a1 1 0 0 0 1 -1v-10a1 1 0 0 0 -1 -1h-1a1 1 0 0 0 -1 1" /><path d="M9 12h6" /><path d="M15 7v10a1 1 0 0 0 1 1h1a1 1 0 0 0 1 -1v-10a1 1 0 0 0 -1 -1h-1a1 1 0 0 0 -1 1" /><path d="M18 8h2a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-2" /><path d="M22 12h-1" /></svg>
                    <span class="nav-label">Exercises</span>
                </button>
                <button class="nav-item" data-target="history">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8l0 4l2 2" /><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" /></svg>
                    <span class="nav-label">History</span>
                </button>
            </nav>
        </div>

        <!-- Shared exercise-detail bottom sheet — one instance reused for
             whichever exercise was last tapped in the library. Populated by
             exercises.js's openSheet(); opened/closed via the .open class. -->
        <div class="sheet-overlay" id="exercise-detail-sheet">
            <div class="sheet-backdrop"></div>
            <div class="sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-header">
                    <div>
                        <h2 class="sheet-title"></h2>
                        <p class="sheet-subtitle"></p>
                    </div>
                    <button class="sheet-close icon-button">✕</button>
                </div>
                <ul class="muscle-role-list"></ul>
                <button class="cta-primary sheet-add-btn">Add to session</button>
            </div>
        </div>

        <!-- Quick-log sheet — opened by tapping a heatmap region
             (js/heatmap.js). Lists the top exercises for whichever muscle
             in that region is most under-trained; tapping one adds it
             straight to the session (same action as the exercise detail
             sheet's "Add to session", no separate button needed here). -->
        <div class="sheet-overlay" id="quick-log-sheet">
            <div class="sheet-backdrop"></div>
            <div class="sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-header">
                    <div>
                        <h2 class="sheet-title"></h2>
                        <p class="sheet-subtitle"></p>
                    </div>
                    <button class="sheet-close icon-button">✕</button>
                </div>
                <ul class="exercise-list"></ul>
            </div>
        </div>

        <!-- Log detail sheet — opened by tapping a History list entry
             (js/history.js). Read-only view of one logged session: reuses
             .session-list/.exercise-card styling from the Log screen minus
             the interactive add-set form, since there's nothing to edit
             here. "Delete workout" removes it and repaints the heatmap. -->
        <div class="sheet-overlay" id="log-detail-sheet">
            <div class="sheet-backdrop"></div>
            <div class="sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-header">
                    <div>
                        <h2 class="sheet-title"></h2>
                        <p class="sheet-subtitle"></p>
                    </div>
                    <button class="sheet-close icon-button">✕</button>
                </div>
                <ul class="session-list"></ul>
                <button class="cta-danger" id="delete-log-btn">Delete workout</button>
            </div>
        </div>
    </div>

    <!-- type="module" enables import/export across js/*.js — app.js is the
         entry point and pulls in the rest. Needs the app served over
         http://, not opened as a file:// URL (see README "Running it"). -->
    <script src="js/app.js" type="module"></script>
</body>
</html>
